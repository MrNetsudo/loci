<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hereya Admin — Moderation</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <style>
    .flag-card{background:var(--bg-elevated,var(--bg-card));border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .2s}
    .flag-card:hover{border-color:var(--accent)}
    .flag-content{font-size:14px;line-height:1.5;margin:0 0 12px;max-height:80px;overflow:hidden;text-overflow:ellipsis}
    .flag-meta{display:flex;gap:16px;font-size:12px;color:var(--text-secondary);margin-bottom:12px}
    .flag-actions{display:flex;gap:8px}
    .flag-count-badge{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;margin-left:8px}
    .empty-state{text-align:center;padding:60px 24px;color:var(--text-muted)}
    .empty-state .big-icon{font-size:48px;margin-bottom:12px}
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="sidebar-overlay"></div>
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon" style="background:linear-gradient(135deg,#6366f1,#06b6d4)">H</div>
      <div><div class="brand-text">NetSudo</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">NetSudo</div>
      <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></a>
      <a href="/admin/pipeline" class="nav-item"><span class="nav-icon">🔀</span><span class="nav-text">Pipeline</span></a>
      <a href="/admin/contacts" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">Contacts</span></a>
      <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
      <div class="nav-section-label">Hereya</div>
      <a href="/admin/hereya" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Overview</span></a>
      <a href="/admin/hereya/venues" class="nav-item"><span class="nav-icon">📍</span><span class="nav-text">Venues</span></a>
      <a href="/admin/hereya/users" class="nav-item"><span class="nav-icon">👤</span><span class="nav-text">Users</span></a>
      <a href="/admin/hereya/rooms" class="nav-item"><span class="nav-icon">💬</span><span class="nav-text">Rooms</span></a>
      <a href="/admin/hereya/moderation" class="nav-item active"><span class="nav-icon">🛡</span><span class="nav-text">Moderation</span></a>
      <a href="/admin/hereya/waitlist" class="nav-item"><span class="nav-icon">📋</span><span class="nav-text">Waitlist</span></a>
    </nav>
  </aside>
  <div class="main-wrapper">
    <header id="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="document.getElementById('app-layout').classList.toggle('sidebar-open')">☰</button>
        <h1 class="page-title">Moderation <span class="flag-count-badge" id="flag-badge" style="display:none">0</span></h1>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
        <a href="/admin/logout" class="logout-btn">Logout</a>
      </div>
    </header>
    <main class="main-content">
      <div id="flag-list">
        <div class="flag-card"><div class="skeleton" style="height:80px"></div></div>
        <div class="flag-card"><div class="skeleton" style="height:80px"></div></div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script>
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ns-theme',t);document.getElementById('theme-toggle').textContent=t==='dark'?'☀️':'🌙';}
(function(){const t=localStorage.getItem('ns-theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-toggle').textContent=t==='dark'?'☀️':'🌙';document.querySelector('.sidebar-overlay').onclick=()=>document.getElementById('app-layout').classList.remove('sidebar-open');})();
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function timeAgo(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);return h<24?h+'h ago':Math.floor(h/24)+'d ago';}
function toast(msg,type='success'){const c=document.getElementById('toast-container');const el=document.createElement('div');el.className='toast toast-'+type;el.innerHTML='<div class="toast-icon">'+(type==='success'?'✓':'✕')+'</div><div class="toast-msg">'+msg+'</div>';c.appendChild(el);requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),350)},3500);}

let flagged=[];

function render(){
  const el=document.getElementById('flag-list');
  const badge=document.getElementById('flag-badge');
  if(!flagged.length){
    el.innerHTML='<div class="empty-state"><div class="big-icon">✅</div><h3>No flagged messages</h3><p>All clear! No content requires review.</p></div>';
    badge.style.display='none';
    return;
  }
  badge.style.display='inline';
  badge.textContent=flagged.length;
  el.innerHTML=flagged.map(f=>`<div class="flag-card" id="flag-${f.id}">
    <div class="flag-content">"${esc((f.snippet||'').substring(0,200))}"</div>
    <div class="flag-meta">
      <span>📍 ${esc(f.venue||'Unknown venue')}</span>
      <span>⏰ ${timeAgo(f.time)}</span>
      <span>🏷 ${esc(f.reason)}</span>
    </div>
    <div class="flag-actions">
      <button class="btn btn-success btn-xs" onclick="dismiss('${f.id}')">✅ Dismiss</button>
      <button class="btn btn-danger btn-xs" onclick="del('${f.id}')">🗑️ Delete</button>
      <a href="/admin/hereya/users" class="btn btn-ghost btn-xs">👤 View User</a>
    </div>
  </div>`).join('');
}

async function dismiss(id){
  try{
    await fetch('/admin/api/hereya/moderation/'+id+'/dismiss',{method:'POST'});
    flagged=flagged.filter(f=>f.id!==id);render();toast('Message dismissed');
  }catch(e){toast('Failed','error');}
}

async function del(id){
  if(!confirm('Delete this message permanently?'))return;
  try{
    await fetch('/admin/api/hereya/moderation/'+id,{method:'DELETE'});
    flagged=flagged.filter(f=>f.id!==id);render();toast('Message deleted');
  }catch(e){toast('Failed','error');}
}

async function load(){
  try{
    const data=await fetch('/admin/api/hereya/moderation').then(r=>r.json());
    flagged=data.flagged||[];render();
  }catch(e){console.error(e);}
}

load();
setInterval(load,60000);
</script>
</body>
</html>
