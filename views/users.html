<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — NetSudo Admin</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="sidebar-overlay"></div>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
    <header id="topbar"></header>
    <main class="main-content">

      <div class="page-header">
        <div>
          <div class="page-heading">User Management</div>
          <div class="page-sub">Manage admin panel access</div>
        </div>
        <button class="btn btn-primary" onclick="openAddUser()">+ Add User</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Last Login</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="user-modal-title">Add User</div>
      <button class="modal-close">✕</button>
    </div>
    <form id="user-form">
      <input type="hidden" id="user-id" value="">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" id="user-username" placeholder="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" id="user-role">
            <option value="admin">Admin</option>
            <option value="superadmin">Super Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" id="pw-label">Password</label>
          <input class="form-control" type="password" id="user-password" placeholder="Set password">
          <div class="form-hint" id="pw-hint">Leave blank to keep current password</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn btn-primary" id="user-submit-btn">Add User</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/admin/js/app.js"></script>
<script>
let currentUserId = null;

async function loadUsers() {
  try {
    const users = await API.get('/admin/api/users');
    renderUsers(users);
  } catch (e) {
    Toast.error('Failed to load users: ' + e.message);
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">No users found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:9px">
          <div class="user-avatar" style="width:28px;height:28px;font-size:10px">${initials(u.username)}</div>
          <span style="font-weight:500">${escHtml(u.username)}</span>
        </div>
      </td>
      <td>
        <span class="badge" style="background:${u.role==='superadmin'?'rgba(99,102,241,0.15)':'rgba(59,130,246,0.15)'};color:${u.role==='superadmin'?'#6366f1':'#3b82f6'};border:1px solid ${u.role==='superadmin'?'#6366f130':'#3b82f630'}">
          ${u.role==='superadmin'?'Super Admin':'Admin'}
        </span>
      </td>
      <td class="td-muted">${u.last_login ? fmtDateTime(u.last_login) : 'Never'}</td>
      <td class="td-muted">${fmtDate(u.created_at)}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-xs" onclick="openEditUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">Edit</button>
          <button class="btn btn-ghost btn-xs text-red" onclick="deleteUser(${u.id},'${escHtml(u.username)}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

function openAddUser() {
  document.getElementById('user-modal-title').textContent = 'Add User';
  document.getElementById('user-id').value = '';
  document.getElementById('user-username').value = '';
  document.getElementById('user-role').value = 'admin';
  document.getElementById('user-password').value = '';
  document.getElementById('user-password').required = true;
  document.getElementById('pw-hint').style.display = 'none';
  document.getElementById('pw-label').textContent = 'Password *';
  document.getElementById('user-submit-btn').textContent = 'Add User';
  currentUserId = null;
  openModal('user-modal');
}

function openEditUser(u) {
  document.getElementById('user-modal-title').textContent = 'Edit User';
  document.getElementById('user-id').value = u.id;
  document.getElementById('user-username').value = u.username;
  document.getElementById('user-role').value = u.role;
  document.getElementById('user-password').value = '';
  document.getElementById('user-password').required = false;
  document.getElementById('pw-hint').style.display = 'block';
  document.getElementById('pw-label').textContent = 'New Password';
  document.getElementById('user-submit-btn').textContent = 'Save Changes';
  currentUserId = u.id;
  openModal('user-modal');
}

document.getElementById('user-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn  = document.getElementById('user-submit-btn');
  const data = {
    username: document.getElementById('user-username').value,
    role:     document.getElementById('user-role').value,
    password: document.getElementById('user-password').value || undefined,
  };
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    if (currentUserId) {
      await API.put(`/admin/api/users/${currentUserId}`, data);
      Toast.success('User updated');
    } else {
      await API.post('/admin/api/users', data);
      Toast.success('User created');
    }
    closeModal('user-modal');
    loadUsers();
  } catch (err) {
    Toast.error(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = currentUserId ? 'Save Changes' : 'Add User';
  }
});

function deleteUser(id, username) {
  showConfirm({
    title: 'Delete User',
    text: `Remove "${username}" from the admin panel? This cannot be undone.`,
    confirmText: 'Delete',
    danger: true,
    onConfirm: async () => {
      try {
        await API.del(`/admin/api/users/${id}`);
        Toast.success('User deleted');
        loadUsers();
      } catch (e) { Toast.error(e.message); }
    }
  });
}

initLayout({ page: 'users', title: 'Users' }).then(() => {
  initModal('user-modal');
  loadUsers();
});
</script>
</body>
</html>
