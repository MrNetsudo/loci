<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Client Portal — NetSudo</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --accent: #6C63FF; --accent-hover: #5a52e0; }
    .nav-item.active { background: #6C63FF; }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }
    .project-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .project-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .project-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .status-pill {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 100px;
      font-size: 11.5px; font-weight: 600;
      white-space: nowrap;
    }
    .pill-active     { background: rgba(16,185,129,0.12); color: #10b981; }
    .pill-inprogress { background: rgba(108,99,255,0.12); color: #6C63FF; }
    .pill-planning   { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .pill-completed  { background: rgba(107,114,128,0.12); color: #6b7280; }
    .pill-onhold     { background: rgba(239,68,68,0.12); color: #ef4444; }
    .progress-wrap { margin-bottom: 16px; }
    .progress-label { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-label span { font-size: 12px; color: var(--text-secondary); }
    .progress-label strong { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .progress-track {
      width: 100%; height: 8px;
      background: var(--border);
      border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #6C63FF, #8b83ff);
      transition: width 0.8s ease;
    }
    .project-meta {
      display: flex; gap: 20px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    .meta-value { font-size: 13px; color: var(--text-primary); font-weight: 500; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" onclick="document.querySelector('.app-layout').classList.remove('sidebar-open')"></div>
    <aside id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon" style="background:#6C63FF"><i class="fas fa-shield-halved" style="color:#fff;font-size:14px"></i></div>
        <div>
          <div class="brand-text">NetSudo</div>
          <div class="brand-sub">CLIENT PORTAL</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/client/portal" class="nav-item"><span class="nav-icon"><i class="fas fa-grid-2"></i></span><span class="nav-text">Portal</span></a>
        <a href="/client/tickets" class="nav-item"><span class="nav-icon"><i class="fas fa-ticket"></i></span><span class="nav-text">Tickets</span></a>
        <a href="/client/invoices" class="nav-item"><span class="nav-icon"><i class="fas fa-file-invoice-dollar"></i></span><span class="nav-text">Invoices</span></a>
        <a href="/client/projects" class="nav-item active"><span class="nav-icon"><i class="fas fa-diagram-project"></i></span><span class="nav-text">Projects</span></a>
      </nav>
      <div class="sidebar-footer">
        <a href="/client/logout" class="nav-item" style="color:rgba(255,255,255,0.4)"><span class="nav-icon"><i class="fas fa-arrow-right-from-bracket"></i></span><span class="nav-text">Logout</span></a>
      </div>
    </aside>

    <div class="main-wrapper">
      <header id="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" onclick="document.querySelector('.app-layout').classList.toggle('sidebar-open')"><i class="fas fa-bars"></i></button>
          <span class="page-title">Projects</span>
        </div>
        <div class="topbar-right"></div>
      </header>

      <main class="main-content">
        <div class="page-header">
          <div>
            <div class="page-heading">Your Projects</div>
            <div class="page-sub">Track the progress of all active and upcoming projects</div>
          </div>
        </div>
        <div class="projects-grid" id="projectsGrid">
          <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">Loading projects...</div>
        </div>
      </main>
    </div>
  </div>

  <script>
    function statusPill(s) {
      const map = {
        'Active': 'pill-active', 'In Progress': 'pill-inprogress',
        'Planning': 'pill-planning', 'Completed': 'pill-completed',
        'On Hold': 'pill-onhold',
      };
      return `<span class="status-pill ${map[s] || 'pill-inprogress'}">${s}</span>`;
    }
    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    (async () => {
      try {
        const r = await fetch('/api/client/projects');
        const d = await r.json();
        const grid = document.getElementById('projectsGrid');
        if (!d.projects.length) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><i class="fas fa-diagram-project"></i></div><div class="empty-text">No projects yet</div></div>';
          return;
        }
        grid.innerHTML = d.projects.map(p => `
          <div class="project-card">
            <div class="project-header">
              <div class="project-name">${p.name}</div>
              ${statusPill(p.status)}
            </div>
            <div class="progress-wrap">
              <div class="progress-label">
                <span>Progress</span>
                <strong>${p.progress}%</strong>
              </div>
              <div class="progress-track">
                <div class="progress-fill" style="width:${p.progress}%"></div>
              </div>
            </div>
            <div class="project-meta">
              <div class="meta-item">
                <span class="meta-label">Start Date</span>
                <span class="meta-value">${fmtDate(p.start || p.startDate)}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Target Completion</span>
                <span class="meta-value">${fmtDate(p.eta || p.endDate)}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('projectsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--accent-red)">Failed to load projects</div>';
      }
    })();
  </script>
</body>
</html>
