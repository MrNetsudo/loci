<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — NetSudo Admin</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="sidebar-overlay"></div>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
    <header id="topbar"></header>
    <main class="main-content">

      <div class="page-header">
        <div>
          <div class="page-heading">Contacts</div>
          <div class="page-sub" id="count-label">Loading…</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-secondary" onclick="exportCsv()">⬇ Export CSV</button>
          <button class="btn btn-primary" onclick="openAddModal()">+ Add Contact</button>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" id="search" placeholder="Search name, email, company…">
        </div>
        <select class="filter-select" id="filter-stage">
          <option value="">All Stages</option>
          <option>New</option>
          <option>Contacted</option>
          <option>In Conversation</option>
          <option>Proposal Sent</option>
          <option>Closed Won</option>
          <option>Closed Lost</option>
        </select>
        <select class="filter-select" id="filter-tag">
          <option value="">All Tags</option>
          <option value="lead">Lead</option>
          <option value="prospect">Prospect</option>
          <option value="client">Client</option>
          <option value="cold">Cold</option>
          <option value="partner">Partner</option>
        </select>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-sort="name" class="sortable">Contact</th>
                <th data-sort="company" class="sortable">Company</th>
                <th data-sort="phone" class="sortable">Phone</th>
                <th data-sort="stage" class="sortable">Stage</th>
                <th data-sort="tag" class="sortable">Tag</th>
                <th data-sort="source" class="sortable">Source</th>
                <th data-sort="created_at" class="sortable">Added</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="contacts-tbody">
              <!-- Rendered by contacts.js -->
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add Contact Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Contact</div>
      <button class="modal-close">✕</button>
    </div>
    <form id="add-form">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-control" type="text" name="name" placeholder="John Smith">
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input class="form-control" type="email" name="email" placeholder="john@example.com" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company</label>
            <input class="form-control" type="text" name="company" placeholder="Acme Corp">
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" type="tel" name="phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Stage</label>
            <select class="form-control" name="stage">
              <option value="New" selected>New</option>
              <option value="Contacted">Contacted</option>
              <option value="In Conversation">In Conversation</option>
              <option value="Proposal Sent">Proposal Sent</option>
              <option value="Closed Won">Closed Won</option>
              <option value="Closed Lost">Closed Lost</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tag</label>
            <select class="form-control" name="tag">
              <option value="lead" selected>Lead</option>
              <option value="prospect">Prospect</option>
              <option value="client">Client</option>
              <option value="cold">Cold</option>
              <option value="partner">Partner</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-control" name="notes" placeholder="Any notes about this contact…"></textarea>
        </div>
        <input type="hidden" name="source" value="manual">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn btn-primary">Add Contact</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/admin/js/app.js"></script>
<script src="/admin/js/contacts.js"></script>
</body>
</html>
