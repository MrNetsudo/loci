<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hereya Admin — Rooms</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
    .tab-btn{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all var(--transition);font-family:var(--font)}
    .tab-btn:hover{color:var(--text-primary)}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .room-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px}
    .room-card{background:var(--bg-elevated,var(--bg-card));border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;transition:border-color .2s}
    .room-card:hover{border-color:var(--accent)}
    .room-card .occupancy-big{font-size:36px;font-weight:700;line-height:1}
    .room-card .venue-name{font-size:15px;font-weight:600;margin:8px 0 4px}
    .room-card .meta{font-size:12px;color:var(--text-secondary)}
    .room-card .badge-corner{position:absolute;top:12px;right:12px}
    .stat-mini{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
    .stat-mini div{font-size:12px;color:var(--text-secondary)}
    .stat-mini div span{display:block;font-size:16px;font-weight:600;color:var(--text-primary)}
    th.sortable{cursor:pointer;user-select:none}
    th.sortable:hover{color:var(--accent)}
    th.sortable.asc::after{content:'▲';margin-left:4px;opacity:.4}
    th.sortable.desc::after{content:'▼';margin-left:4px;opacity:.4}
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="sidebar-overlay"></div>
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon" style="background:linear-gradient(135deg,#6366f1,#06b6d4)">H</div>
      <div><div class="brand-text">NetSudo</div><div class="brand-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">NetSudo</div>
      <a href="/admin/dashboard" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></a>
      <a href="/admin/pipeline" class="nav-item"><span class="nav-icon">🔀</span><span class="nav-text">Pipeline</span></a>
      <a href="/admin/contacts" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">Contacts</span></a>
      <a href="/admin/settings" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
      <div class="nav-section-label">Hereya</div>
      <a href="/admin/hereya" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Overview</span></a>
      <a href="/admin/hereya/venues" class="nav-item"><span class="nav-icon">📍</span><span class="nav-text">Venues</span></a>
      <a href="/admin/hereya/users" class="nav-item"><span class="nav-icon">👤</span><span class="nav-text">Users</span></a>
      <a href="/admin/hereya/rooms" class="nav-item active"><span class="nav-icon">💬</span><span class="nav-text">Rooms</span></a>
      <a href="/admin/hereya/moderation" class="nav-item"><span class="nav-icon">🛡</span><span class="nav-text">Moderation</span></a>
      <a href="/admin/hereya/waitlist" class="nav-item"><span class="nav-icon">📋</span><span class="nav-text">Waitlist</span></a>
    </nav>
  </aside>
  <div class="main-wrapper">
    <header id="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="document.getElementById('app-layout').classList.toggle('sidebar-open')">☰</button>
        <h1 class="page-title">Rooms</h1>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
        <a href="/admin/logout" class="logout-btn">Logout</a>
      </div>
    </header>
    <main class="main-content">

      <div class="card">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="live">Live Rooms</button>
          <button class="tab-btn" data-tab="history">History</button>
          <button class="tab-btn" data-tab="stats">Stats</button>
        </div>

        <!-- Live Rooms: Cards -->
        <div class="tab-panel active" id="tab-live">
          <div class="room-cards" id="live-cards">
            <div class="room-card"><div class="skeleton" style="height:120px"></div></div>
            <div class="room-card"><div class="skeleton" style="height:120px"></div></div>
          </div>
        </div>

        <!-- History: Table -->
        <div class="tab-panel" id="tab-history">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="sortable" data-col="venue">Venue</th>
                  <th class="sortable" data-col="peak">Peak</th>
                  <th class="sortable" data-col="messages">Messages</th>
                  <th>Duration</th>
                  <th class="sortable" data-col="closed">Closed At</th>
                </tr>
              </thead>
              <tbody id="history-tbody">
                <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Stats -->
        <div class="tab-panel" id="tab-stats">
          <div style="padding:24px">
            <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
              <div class="stat-card" style="--stat-color:#6366f1">
                <div class="stat-value" id="stat-avg-dur">—</div>
                <div class="stat-label">Avg Room Duration</div>
              </div>
              <div class="stat-card" style="--stat-color:#06b6d4">
                <div class="stat-value" id="stat-avg-peak">—</div>
                <div class="stat-label">Avg Peak Occupancy</div>
              </div>
              <div class="stat-card" style="--stat-color:#10b981">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Total Rooms</div>
              </div>
            </div>
            <div class="card" style="padding:16px">
              <h4 style="margin:0 0 12px;font-size:14px">Busiest Hours</h4>
              <canvas id="hours-chart" height="200"></canvas>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>
<div id="toast-container"></div>
<script>
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ns-theme',t);document.getElementById('theme-toggle').textContent=t==='dark'?'☀️':'🌙';}
(function(){const t=localStorage.getItem('ns-theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-toggle').textContent=t==='dark'?'☀️':'🌙';document.querySelector('.sidebar-overlay').onclick=()=>document.getElementById('app-layout').classList.remove('sidebar-open');})();
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function timeAgo(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);return h<24?h+'h ago':Math.floor(h/24)+'d ago';}
function fmtDuration(start,end){if(!start)return'—';const ms=(end?new Date(end):new Date())-new Date(start);const m=Math.floor(ms/60000);if(m<60)return m+'m';return Math.floor(m/60)+'h '+m%60+'m';}
function statusBadge(s){const colors={active:'#10b981',warming:'#f59e0b',cooling:'#06b6d4',closed:'#6b7280'};const c=colors[s]||'#6b7280';return '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'30">'+esc(s)+'</span>';}

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  };
});

let historyRooms=[], hSortCol='closed', hSortDir='desc';

async function loadLive(){
  try{
    const data=await fetch('/admin/api/hereya/rooms/live').then(r=>r.json());
    const el=document.getElementById('live-cards');
    if(!data.rooms.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-muted)">No active rooms right now</div>';return;}
    el.innerHTML=data.rooms.map(r=>`<div class="room-card">
      <div class="badge-corner">${statusBadge(r.status)}</div>
      <div class="occupancy-big" style="color:${r.status==='active'?'#10b981':'#f59e0b'}">${r.occupancy}</div>
      <div class="venue-name">${esc(r.venue)}</div>
      <div class="meta">${esc(r.city)}${r.category?' · '+esc(r.category):''}</div>
      <div class="stat-mini">
        <div>Messages<span>${r.messages}</span></div>
        <div>Peak<span>${r.peak}</span></div>
        <div>Active<span>${fmtDuration(r.started)}</span></div>
      </div>
    </div>`).join('');
  }catch(e){console.error(e);}
}

async function loadHistory(){
  try{
    const data=await fetch('/admin/api/hereya/rooms/history').then(r=>r.json());
    historyRooms=data.rooms||[];
    renderHistory();
    computeStats(historyRooms);
  }catch(e){console.error(e);}
}

function renderHistory(){
  const tb=document.getElementById('history-tbody');
  if(!historyRooms.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">No room history</td></tr>';return;}
  const sorted=[...historyRooms].sort((a,b)=>{
    let va=a[hSortCol]||'',vb=b[hSortCol]||'';
    if(typeof va==='number')return hSortDir==='asc'?va-vb:vb-va;
    if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return hSortDir==='asc'?-1:1;if(va>vb)return hSortDir==='asc'?1:-1;return 0;
  });
  tb.innerHTML=sorted.map(r=>`<tr>
    <td><strong>${esc(r.venue)}</strong><span class="td-muted" style="margin-left:6px">${esc(r.city)}</span></td>
    <td>${r.peak}</td>
    <td>${(r.messages||0).toLocaleString()}</td>
    <td class="td-muted">${fmtDuration(r.started,r.closed)}</td>
    <td class="td-muted">${r.closed?new Date(r.closed).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—'}</td>
  </tr>`).join('');
  document.querySelectorAll('#tab-history th.sortable').forEach(th=>{th.classList.remove('asc','desc');if(th.dataset.col===hSortCol)th.classList.add(hSortDir);});
}

function computeStats(rooms){
  if(!rooms.length)return;
  let totalDur=0,totalPeak=0,hourCounts=new Array(24).fill(0);
  rooms.forEach(r=>{
    if(r.started&&r.closed){totalDur+=(new Date(r.closed)-new Date(r.started))/60000;}
    totalPeak+=r.peak||0;
    if(r.started){hourCounts[new Date(r.started).getHours()]++;}
  });
  const avgDur=Math.round(totalDur/rooms.length);
  const avgPeak=Math.round(totalPeak/rooms.length);
  document.getElementById('stat-avg-dur').textContent=avgDur<60?avgDur+'m':Math.floor(avgDur/60)+'h '+avgDur%60+'m';
  document.getElementById('stat-avg-peak').textContent=avgPeak;
  document.getElementById('stat-total').textContent=rooms.length;
  const ctx=document.getElementById('hours-chart').getContext('2d');
  const textColor=getComputedStyle(document.documentElement).getPropertyValue('--text-secondary')||'#94a3b8';
  new Chart(ctx,{
    type:'bar',
    data:{labels:hourCounts.map((_,i)=>i+':00'),datasets:[{label:'Rooms Opened',data:hourCounts,backgroundColor:'rgba(99,102,241,0.6)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:textColor,font:{size:10}}},y:{ticks:{color:textColor},beginAtZero:true}}}
  });
}

document.querySelectorAll('#tab-history th.sortable').forEach(th=>{
  th.onclick=()=>{if(hSortCol===th.dataset.col){hSortDir=hSortDir==='asc'?'desc':'asc';}else{hSortCol=th.dataset.col;hSortDir='desc';}renderHistory();};
});

Promise.all([loadLive(),loadHistory()]);
</script>
</body>
</html>
