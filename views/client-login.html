<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — NetSudo</title>
  <link rel="stylesheet" href="/admin/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --accent: #6C63FF;
      --accent-hover: #5a52e0;
    }
    .login-logo-icon {
      background: linear-gradient(135deg, #6C63FF, #4834d4);
    }
    .login-card {
      border-top: 3px solid #6C63FF;
    }
    .btn-primary {
      background: #6C63FF;
    }
    .btn-primary:hover {
      background: #5a52e0;
      box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    }
    .form-control:focus {
      border-color: #6C63FF;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    .login-footer a { color: #6C63FF; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon"><i class="fas fa-shield-halved" style="color:#fff"></i></div>
        <div class="login-title">Client Portal</div>
        <div class="login-sub">Sign in to your NetSudo account</div>
      </div>
      <div id="error-banner" class="error-banner hidden"></div>
      <form method="POST" action="/client/login" id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@company.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px 16px;font-size:14px;margin-top:6px">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign In
        </button>
      </form>
      <div class="login-footer">
        Need help? <a href="mailto:support@netsudo.com">Contact Support</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const b = document.getElementById('error-banner');
      b.textContent = 'Invalid credentials. Please try again.';
      b.classList.remove('hidden');
    }
  </script>
</body>
</html>
